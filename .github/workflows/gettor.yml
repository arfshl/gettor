name: GetTor

on:
  workflow_dispatch: 
  schedule:
    - cron: "0 */6 * * *"
  
  
permissions:
  contents: write

jobs:

  gettor:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Download release data
      run: |
        curl https://aus1.torproject.org/torbrowser/update_3/release/downloads.json -o downloads.json
        curl https://aus1.torproject.org/torbrowser/update_3/release/download-android-aarch64.json -o download-android-aarch64.json
        curl https://aus1.torproject.org/torbrowser/update_3/release/download-android-armv7.json -o download-android-armv7.json
        curl https://aus1.torproject.org/torbrowser/update_3/release/download-android-x86.json -o download-android-x86.json
        curl https://aus1.torproject.org/torbrowser/update_3/release/download-android-x86_64.json -o download-android-x86_64.json
    - name: Extract download URLs
      run: |
        jq -r '.. | .binary? // empty' downloads.json >> url.txt
        jq -r '.. | .binary? // empty' download-android-aarch64.json >> url.txt
        jq -r '.. | .binary? // empty' download-android-armv7.json >> url.txt
        jq -r '.. | .binary? // empty' download-android-x86.json >> url.txt
        jq -r '.. | .binary? // empty' download-android-x86_64.json >> url.txt
        jq -r '.. | .sig? // empty' downloads.json >> url.txt
        jq -r '.. | .sig? // empty' download-android-aarch64.json >> url.txt
        jq -r '.. | .sig? // empty' download-android-armv7.json >> url.txt
        jq -r '.. | .sig? // empty' download-android-x86.json >> url.txt
        jq -r '.. | .sig? // empty' download-android-x86_64.json >> url.txt
    - name: Extract Tor version and export to environment
      run: |
        version=$(jq -r '.version' downloads.json)
        echo "TOR_VERSION=$version" >> $GITHUB_ENV
    - name: Fetch tor
      run: |
        wget -qi $GITHUB_WORKSPACE/url.txt
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-windows-i686-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-windows-x86_64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-macos-x86_64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-macos-aarch64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-linux-i686-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-linux-x86_64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-x86-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-x86_64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-armv7-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-aarch64-${{ env.TOR_VERSION }}.tar.gz
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-windows-i686-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-windows-x86_64-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-macos-x86_64-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-macos-aarch64-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-linux-i686-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-linux-x86_64-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-x86-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-x86_64-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-armv7-${{ env.TOR_VERSION }}.tar.gz.asc
        wget -q https://archive.torproject.org/tor-package-archive/torbrowser/${{ env.TOR_VERSION }}/tor-expert-bundle-android-aarch64-${{ env.TOR_VERSION }}.tar.gz.asc
    - name: Push to release
      uses: softprops/action-gh-release@v2
      with:
          tag_name: ${{ env.TOR_VERSION }}
          name: ${{ env.TOR_VERSION }}
          files: |
            tor-*.apk
            tor-*.exe
            tor-*.dmg
            tor-*.tar.xz
            tor-*.tar.gz
            tor-*.asc
          preserve_order: true
          make_latest: true
env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
